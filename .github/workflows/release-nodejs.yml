name: Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      # 1. Descargar el código fuente
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Instalar Bun (gestor de paquetes)
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      # 3. Instalar dependencias con Bun
      - name: Install dependencies
        run: bun install

      # 4. Ejecutar linter (valida código TypeScript/React)
      - name: Run linter
        run: bun run lint

      # 5. Incrementar versión en package.json sin crear tag de Git
      #    Guarda la nueva versión en variable de entorno VERSION
      - name: Bump version (no git tag)
        run: |
          bun run npm version patch --no-git-tag-version
          echo "VERSION=$(node -p "require('./package.json').version")" >> $env:GITHUB_ENV
        shell: pwsh

      # 6. PARCHEAR builder.cjs para que NUNCA intente publicar
      #    Inserta la línea process.env.ELECTRON_BUILDER_PUBLISH = 'never'; al inicio del archivo
      - name: Patch builder.cjs to disable auto-publish
        run: |
          $content = Get-Content builder.cjs -Raw
          $newContent = "process.env.ELECTRON_BUILDER_PUBLISH = 'never';`n`n$content"
          Set-Content builder.cjs -Value $newContent -NoNewline
        shell: pwsh

      # 7. Compilar y empaquetar (--publish never por si acaso)
      #    No se pasa GH_TOKEN para evitar cualquier intento de autenticación
      - name: Build application (publish disabled)
        run: node builder.cjs win --publish never
        # Sin env GH_TOKEN, sin env ELECTRON_BUILDER_PUBLISH (ya está forzado dentro del script)

      # 8. Subir el instalador como artifact temporal (opcional, útil para depuración)
      - name: Upload build artifact (temporary)
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*.exe

      # 9. Crear release en GitHub y adjuntar TODOS los assets generados
      #    (exe, blockmap, latest.yml) - solo cuando es push a main (no en PR)
      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          draft: false
          prerelease: false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}