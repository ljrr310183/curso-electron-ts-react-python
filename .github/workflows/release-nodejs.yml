name: Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run linter
        run: bun run lint

      # Build y empaquetado sin publicación automática
      - name: Build application
        run: node builder.cjs win --publish never
        env:
          ELECTRON_BUILDER_PUBLISH: never   # desactiva publicación automática
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # token válido (evita 401 aunque no publique)

      # Subir artifact temporal (opcional, solo para debug)
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*.exe

      # Crear release en GitHub (solo en push a main)
      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.exe
          tag_name: v${{ github.run_number }}
          name: Release ${{ github.run_number }}
          draft: false
          prerelease: false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}