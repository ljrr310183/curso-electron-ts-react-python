name: Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run linter
        run: bun run lint

      # Bump version (solo modifica package.json, no commit)
      - name: Bump version via npm version patch
        run: |
          bun run npm version patch --no-git-tag-version
          echo "VERSION=$(node -p "require('./package.json').version")" >> $env:GITHUB_ENV
        shell: pwsh

      # Compilar y empaquetar sin publicar
      - name: Build application
        run: node builder.cjs win --publish never
        env:
          GH_TOKEN: dummy                     # evita error de token faltante
          ELECTRON_BUILDER_PUBLISH: never     # doble seguridad

      # Subir artifact temporal (opcional)
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*.exe

      # Crear release con todos los assets generados por electron-builder
      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          draft: false
          prerelease: false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}